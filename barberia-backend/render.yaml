# Infraestructura como código para Render.
# NestJS + MongoDB Atlas (sin base de datos gestionada por Render).
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: barberia-backend
    runtime: node
    plan: free
    region: oregon
    branch: main
    rootDir: barberia-backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: APP_NAME
        value: barberia-backend
      - key: APP_VERSION
        value: 0.1.0
      - key: GLOBAL_PREFIX
        value: api/v1
      - key: FRONTEND_URL
        sync: false           # Configurar en dashboard: URL de Vercel.
      - key: DATABASE_URL
        sync: false           # Configurar en dashboard: URI de MongoDB Atlas.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 900s
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: THROTTLE_TTL_MS
        value: 60000
      - key: THROTTLE_LIMIT
        value: 100
